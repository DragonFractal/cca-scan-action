name: 'CCA Cost Scan'
description: 'Scan cloud infrastructure for cost optimization opportunities with Cloud Cost Analyzer'
author: 'DragonFractal'
branding:
  icon: 'dollar-sign'
  color: 'blue'

inputs:
  api-key:
    description: 'CCA API key for managed mode (required)'
    required: true
  provider:
    description: 'Cloud provider to scan (aws, azure)'
    required: false
    default: 'aws'
  regions:
    description: 'Comma-separated regions to scan (e.g. us-east-1,us-west-2)'
    required: false
    default: ''
  service-url:
    description: 'CCA service URL'
    required: false
    default: 'https://cca.dragonfractal.com'
  version:
    description: 'CCA Docker image version tag (default: latest)'
    required: false
    default: 'latest'
  output-file:
    description: 'Path to save the JSON scan results'
    required: false
    default: 'cca-scan-results.json'
  comment-on-pr:
    description: 'Post scan summary as a PR comment (true/false)'
    required: false
    default: 'true'
  fail-on-findings:
    description: 'Fail the action if findings exceed this threshold (0 = never fail)'
    required: false
    default: '0'
  fail-on-scan-error:
    description: 'Fail the action if the scan fails to run at all (distinct from finding nothing). true/false'
    required: false
    default: 'true'

outputs:
  findings-count:
    description: 'Number of findings detected'
    value: ${{ steps.scan.outputs.findings_count }}
  total-savings:
    description: 'Total potential monthly savings (USD)'
    value: ${{ steps.scan.outputs.total_savings }}
  scan-status:
    description: 'Whether the scan completed (ok) or failed to run (failed)'
    value: ${{ steps.scan.outputs.scan_status }}

runs:
  using: 'composite'
  steps:
    - name: Pull CCA image
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: docker pull "dragonfractal/cca:$VERSION"

    - name: Run CCA scan
      id: scan
      shell: bash
      env:
        # Bind inputs to env so their values are never interpolated into the
        # script text (avoids shell/script injection via untrusted input).
        # The CLI reads the key from CCA_API_KEY (clap `env`), so it's passed
        # into the container by env only — never on argv (keeps it out of `ps`).
        CCA_API_KEY: ${{ inputs.api-key }}
        PROVIDER: ${{ inputs.provider }}
        REGIONS: ${{ inputs.regions }}
        SERVICE_URL: ${{ inputs.service-url }}
        VERSION: ${{ inputs.version }}
        OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        set -euo pipefail

        # Pass cloud creds through; mark the run as a GitHub Action so backend
        # activation tracking attributes it correctly.
        DOCKER_ARGS=(--rm)
        DOCKER_ARGS+=(-e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY)
        DOCKER_ARGS+=(-e AWS_SESSION_TOKEN -e AWS_DEFAULT_REGION -e AWS_REGION)
        DOCKER_ARGS+=(-e CCA_RUNNER=github_action -e CCA_API_KEY)
        DOCKER_ARGS+=(-v "$(pwd):/output" -w /output)

        # Always scan to JSON — the action's outputs, PR comment, and threshold
        # are derived from it with jq. The key is passed via CCA_API_KEY env
        # (see -e above), so it never appears on argv.
        CCA_ARGS=(scan --provider "$PROVIDER" --service-url "$SERVICE_URL")
        if [ -n "$REGIONS" ]; then
          CCA_ARGS+=(--regions "$REGIONS")
        fi
        CCA_ARGS+=(-o json -f "/output/$OUTPUT_FILE" --all)

        echo "Running CCA scan (runner=github_action)…"
        set +e
        docker run "${DOCKER_ARGS[@]}" "dragonfractal/cca:$VERSION" "${CCA_ARGS[@]}"
        RC=$?
        set -e

        OUT="$OUTPUT_FILE"
        # Distinguish "scan failed to run" from "scan ran, found nothing" — a
        # nonzero exit or missing/invalid JSON means we have no real result and
        # must NOT report it as zero findings (that would fail silently).
        SCAN_STATUS=ok
        if [ "$RC" -ne 0 ]; then
          SCAN_STATUS=failed
          echo "::error title=CCA scan failed::CCA exited $RC — the scan did not complete (check credentials, service-url, and image version)."
        elif ! { [ -s "$OUT" ] && jq -e . "$OUT" >/dev/null 2>&1; }; then
          SCAN_STATUS=failed
          echo "::error title=CCA scan failed::CCA produced no parseable results at $OUT — treating as a failed scan, not zero findings."
        fi

        if [ "$SCAN_STATUS" = ok ]; then
          # total_findings includes gated findings on the community tier.
          FINDINGS=$(jq -r '.summary.total_findings // (.findings | length) // 0' "$OUT")
          SAVINGS=$(jq -r '(.summary.total_monthly_savings // 0) * 100 | round / 100' "$OUT")
        else
          FINDINGS=0
          SAVINGS=0
        fi
        SAVINGS=$(printf '%.2f' "$SAVINGS")

        {
          echo "findings_count=$FINDINGS"
          echo "total_savings=$SAVINGS"
          echo "scan_status=$SCAN_STATUS"
        } >> "$GITHUB_OUTPUT"

        echo "=== CCA Scan Summary ==="
        echo "  Status: $SCAN_STATUS"
        echo "  Findings: $FINDINGS"
        echo "  Potential savings: \$$SAVINGS/mo"

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        FINDINGS: ${{ steps.scan.outputs.findings_count }}
        SAVINGS: ${{ steps.scan.outputs.total_savings }}
        SCAN_STATUS: ${{ steps.scan.outputs.scan_status }}
        OUT: ${{ inputs.output-file }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        # Hidden marker so re-runs update this comment instead of stacking new
        # ones. Kept as the first line of the body.
        MARKER="<!-- cca-scan-results -->"

        if [ "$SCAN_STATUS" = "failed" ]; then
          # Be explicit that this is a failed scan, not a clean bill of health.
          {
            echo "$MARKER"
            echo "## Cloud Cost Analyzer — ⚠️ Scan Failed"
            echo ""
            echo "The scan did not complete, so **no cost findings are available** for this PR."
            echo "Check the workflow logs — usually credentials, \`service-url\`, or the image \`version\`."
            echo ""
            echo "---"
            echo "*[Cloud Cost Analyzer](https://cca.dragonfractal.com)*"
          } > cca-comment.md
        else
          # Top findings table, rendered declaratively from the JSON with jq.
          if [ -s "$OUT" ] && jq -e . "$OUT" >/dev/null 2>&1; then
            TOP=$(jq -r '
              (.findings // []) | sort_by(-(.estimated_monthly_savings // 0)) | .[:10] as $t
              | if ($t | length) == 0 then "No detailed findings available (upgrade for full details)."
                else (
                  ["| Severity | Category | Resource | Savings |", "|---|---|---|---|"]
                  + ($t | map("| \(.severity // "?") | \(.category // "?") | `\((.resource_id // "?")[0:40])` | $\(((.estimated_monthly_savings // 0) * 100 | round / 100))/mo |"))
                ) | join("\n")
                end
            ' "$OUT")
          else
            TOP="No detailed findings available."
          fi

          {
            echo "$MARKER"
            echo "## Cloud Cost Analyzer — Scan Results"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Findings | **$FINDINGS** |"
            echo "| Potential Savings | **\$$SAVINGS/mo** |"
            echo ""
            echo "### Top Findings"
            echo ""
            echo "$TOP"
            echo ""
            echo "---"
            echo "*Scanned by [Cloud Cost Analyzer](https://cca.dragonfractal.com)*"
          } > cca-comment.md
        fi

        # Update our existing comment if one is already on the PR, else create it.
        COMMENT_ID=$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
          --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -n1)

        if [ -n "$COMMENT_ID" ]; then
          jq -Rs '{body: .}' cca-comment.md \
            | gh api -X PATCH "repos/$REPO/issues/comments/$COMMENT_ID" --input - >/dev/null
          echo "Updated existing CCA comment ($COMMENT_ID)."
        else
          gh pr comment "$PR_NUMBER" --body-file cca-comment.md
        fi

    - name: Check threshold
      if: inputs.fail-on-findings != '0'
      shell: bash
      env:
        FINDINGS: ${{ steps.scan.outputs.findings_count }}
        THRESHOLD: ${{ inputs.fail-on-findings }}
      run: |
        if [ "$FINDINGS" -gt "$THRESHOLD" ]; then
          echo "::error::CCA found $FINDINGS findings (threshold: $THRESHOLD)"
          exit 1
        fi

    # Runs last so the PR comment (incl. the failure notice) posts first.
    - name: Fail on scan error
      if: steps.scan.outputs.scan_status == 'failed' && inputs.fail-on-scan-error == 'true'
      shell: bash
      run: |
        echo "::error::CCA scan failed to run — failing the action. Set fail-on-scan-error: 'false' to downgrade this to a warning."
        exit 1
