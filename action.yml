name: 'CCA Cost Scan'
description: 'Scan cloud infrastructure for cost optimization opportunities with Cloud Cost Analyzer'
author: 'DragonFractal'
branding:
  icon: 'dollar-sign'
  color: 'blue'

inputs:
  api-key:
    description: 'CCA API key for managed mode (required)'
    required: true
  provider:
    description: 'Cloud provider to scan (aws, azure)'
    required: false
    default: 'aws'
  regions:
    description: 'Comma-separated regions to scan (e.g. us-east-1,us-west-2)'
    required: false
    default: ''
  service-url:
    description: 'CCA service URL'
    required: false
    default: 'https://cca.dragonfractal.com'
  version:
    description: 'CCA Docker image version tag (default: latest)'
    required: false
    default: 'latest'
  output-file:
    description: 'Path to save the JSON scan results'
    required: false
    default: 'cca-scan-results.json'
  comment-on-pr:
    description: 'Post scan summary as a PR comment (true/false)'
    required: false
    default: 'true'
  fail-on-findings:
    description: 'Fail the action if findings exceed this threshold (0 = never fail)'
    required: false
    default: '0'

outputs:
  findings-count:
    description: 'Number of findings detected'
    value: ${{ steps.scan.outputs.findings_count }}
  total-savings:
    description: 'Total potential monthly savings (USD)'
    value: ${{ steps.scan.outputs.total_savings }}

runs:
  using: 'composite'
  steps:
    - name: Pull CCA image
      shell: bash
      run: docker pull dragonfractal/cca:${{ inputs.version }}

    - name: Run CCA scan
      id: scan
      shell: bash
      run: |
        set -euo pipefail

        # Pass cloud creds through; mark the run as a GitHub Action so backend
        # activation tracking attributes it correctly.
        DOCKER_ARGS="--rm"
        DOCKER_ARGS="$DOCKER_ARGS -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY"
        DOCKER_ARGS="$DOCKER_ARGS -e AWS_SESSION_TOKEN -e AWS_DEFAULT_REGION -e AWS_REGION"
        DOCKER_ARGS="$DOCKER_ARGS -e CCA_RUNNER=github_action"
        DOCKER_ARGS="$DOCKER_ARGS -v $(pwd):/output -w /output"

        # Always scan to JSON — the action's outputs, PR comment, and threshold
        # are derived from it with jq.
        CCA_ARGS="scan --provider ${{ inputs.provider }}"
        CCA_ARGS="$CCA_ARGS --api-key ${{ inputs.api-key }}"
        CCA_ARGS="$CCA_ARGS --service-url ${{ inputs.service-url }}"
        if [ -n "${{ inputs.regions }}" ]; then
          CCA_ARGS="$CCA_ARGS --regions ${{ inputs.regions }}"
        fi
        CCA_ARGS="$CCA_ARGS -o json -f /output/${{ inputs.output-file }} --all"

        echo "Running CCA scan (runner=github_action)…"
        docker run $DOCKER_ARGS dragonfractal/cca:${{ inputs.version }} $CCA_ARGS || true

        OUT="${{ inputs.output-file }}"
        if [ -s "$OUT" ] && jq -e . "$OUT" >/dev/null 2>&1; then
          # total_findings includes gated findings on the community tier.
          FINDINGS=$(jq -r '.summary.total_findings // (.findings | length) // 0' "$OUT")
          SAVINGS=$(jq -r '(.summary.total_monthly_savings // 0) * 100 | round / 100' "$OUT")
        else
          echo "::warning::CCA produced no parseable JSON at $OUT; reporting zero."
          FINDINGS=0
          SAVINGS=0
        fi
        SAVINGS=$(printf '%.2f' "$SAVINGS")

        {
          echo "findings_count=$FINDINGS"
          echo "total_savings=$SAVINGS"
        } >> "$GITHUB_OUTPUT"

        echo "=== CCA Scan Summary ==="
        echo "  Findings: $FINDINGS"
        echo "  Potential savings: \$$SAVINGS/mo"

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        FINDINGS="${{ steps.scan.outputs.findings_count }}"
        SAVINGS="${{ steps.scan.outputs.total_savings }}"
        OUT="${{ inputs.output-file }}"

        # Top findings table, rendered declaratively from the JSON with jq.
        if [ -s "$OUT" ] && jq -e . "$OUT" >/dev/null 2>&1; then
          TOP=$(jq -r '
            (.findings // []) | sort_by(-(.estimated_monthly_savings // 0)) | .[:10] as $t
            | if ($t | length) == 0 then "No detailed findings available (upgrade for full details)."
              else (
                ["| Severity | Category | Resource | Savings |", "|---|---|---|---|"]
                + ($t | map("| \(.severity // "?") | \(.category // "?") | `\((.resource_id // "?")[0:40])` | $\(((.estimated_monthly_savings // 0) * 100 | round / 100))/mo |"))
              ) | join("\n")
              end
          ' "$OUT")
        else
          TOP="No detailed findings available."
        fi

        {
          echo "## Cloud Cost Analyzer — Scan Results"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| Findings | **$FINDINGS** |"
          echo "| Potential Savings | **\$$SAVINGS/mo** |"
          echo ""
          echo "### Top Findings"
          echo ""
          echo "$TOP"
          echo ""
          echo "---"
          echo "*Scanned by [Cloud Cost Analyzer](https://cca.dragonfractal.com)*"
        } > cca-comment.md

        gh pr comment "${{ github.event.pull_request.number }}" --body-file cca-comment.md

    - name: Check threshold
      if: inputs.fail-on-findings != '0'
      shell: bash
      run: |
        FINDINGS="${{ steps.scan.outputs.findings_count }}"
        THRESHOLD="${{ inputs.fail-on-findings }}"
        if [ "$FINDINGS" -gt "$THRESHOLD" ]; then
          echo "::error::CCA found $FINDINGS findings (threshold: $THRESHOLD)"
          exit 1
        fi
