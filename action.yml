name: 'CCA Cost Scan'
description: 'Scan cloud infrastructure for cost optimization opportunities with Cloud Cost Analyzer'
author: 'DragonFractal'
branding:
  icon: 'dollar-sign'
  color: 'blue'

inputs:
  api-key:
    description: 'CCA API key for managed mode (required)'
    required: true
  provider:
    description: 'Cloud provider to scan (aws, azure)'
    required: false
    default: 'aws'
  regions:
    description: 'Comma-separated regions to scan (e.g. us-east-1,us-west-2)'
    required: false
    default: ''
  service-url:
    description: 'CCA service URL'
    required: false
    default: 'https://cca.dragonfractal.com'
  version:
    description: 'CCA CLI version (default: latest)'
    required: false
    default: 'latest'
  output-format:
    description: 'Output format: table, json, yaml, markdown'
    required: false
    default: 'json'
  output-file:
    description: 'Path to save scan results'
    required: false
    default: 'cca-scan-results.json'
  comment-on-pr:
    description: 'Post scan summary as a PR comment (true/false)'
    required: false
    default: 'true'
  fail-on-findings:
    description: 'Fail the action if findings exceed this threshold (0 = never fail)'
    required: false
    default: '0'

outputs:
  findings-count:
    description: 'Number of findings detected'
    value: ${{ steps.scan.outputs.findings_count }}
  total-savings:
    description: 'Total potential monthly savings (USD)'
    value: ${{ steps.scan.outputs.total_savings }}
  scan-id:
    description: 'Scan ID from the managed backend'
    value: ${{ steps.scan.outputs.scan_id }}
  optimization-score:
    description: 'Infrastructure optimization score (0-100)'
    value: ${{ steps.scan.outputs.optimization_score }}

runs:
  using: 'composite'
  steps:
    - name: Install CCA
      shell: bash
      run: |
        export CCA_INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$CCA_INSTALL_DIR"
        if [ "${{ inputs.version }}" != "latest" ]; then
          export CCA_VERSION="${{ inputs.version }}"
        fi
        curl -sSL https://releases.dragonfractal.com/install.sh | sh
        echo "$CCA_INSTALL_DIR" >> $GITHUB_PATH

    - name: Run CCA scan
      id: scan
      shell: bash
      env:
        CCA_API_KEY: ${{ inputs.api-key }}
        CCA_SERVICE_URL: ${{ inputs.service-url }}
      run: |
        # Build command
        CMD="cca scan --provider ${{ inputs.provider }} --mode managed"
        CMD="$CMD --api-key $CCA_API_KEY"
        CMD="$CMD --service-url $CCA_SERVICE_URL"

        if [ -n "${{ inputs.regions }}" ]; then
          CMD="$CMD --regions ${{ inputs.regions }}"
        fi

        CMD="$CMD -o ${{ inputs.output-format }}"

        if [ -n "${{ inputs.output-file }}" ]; then
          CMD="$CMD -f ${{ inputs.output-file }}"
        fi

        CMD="$CMD --all"

        echo "Running: $CMD"
        eval $CMD || true

        # Parse results
        if [ -f "${{ inputs.output-file }}" ]; then
          FINDINGS=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        findings = data.get('findings', [])
        summary = data.get('summary', data.get('executive_summary', {}))
        print(f'{len(findings)}')
        " 2>/dev/null || echo "0")

          SAVINGS=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        summary = data.get('summary', data.get('executive_summary', {}))
        print(f'{summary.get(\"total_potential_savings\", summary.get(\"total_monthly_savings\", 0)):.2f}')
        " 2>/dev/null || echo "0.00")

          SCAN_ID=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        print(data.get('scan_id', 'unknown'))
        " 2>/dev/null || echo "unknown")

          SCORE=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        summary = data.get('summary', data.get('executive_summary', {}))
        print(f'{summary.get(\"optimization_score\", 0):.0f}')
        " 2>/dev/null || echo "0")
        else
          FINDINGS=0
          SAVINGS="0.00"
          SCAN_ID="unknown"
          SCORE="0"
        fi

        echo "findings_count=$FINDINGS" >> $GITHUB_OUTPUT
        echo "total_savings=$SAVINGS" >> $GITHUB_OUTPUT
        echo "scan_id=$SCAN_ID" >> $GITHUB_OUTPUT
        echo "optimization_score=$SCORE" >> $GITHUB_OUTPUT

        echo "=== CCA Scan Summary ==="
        echo "  Findings: $FINDINGS"
        echo "  Potential savings: \$$SAVINGS/mo"
        echo "  Scan ID: $SCAN_ID"
        echo "  Optimization score: $SCORE/100"

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        FINDINGS="${{ steps.scan.outputs.findings_count }}"
        SAVINGS="${{ steps.scan.outputs.total_savings }}"
        SCORE="${{ steps.scan.outputs.optimization_score }}"
        SCAN_ID="${{ steps.scan.outputs.scan_id }}"

        # Build top findings table
        TOP_FINDINGS=""
        if [ -f "${{ inputs.output-file }}" ]; then
          TOP_FINDINGS=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        findings = data.get('findings', [])
        if not findings:
            print('No findings detected.')
        else:
            sorted_f = sorted(findings, key=lambda x: x.get('estimated_monthly_savings', 0), reverse=True)[:10]
            print('| Severity | Category | Resource | Savings |')
            print('|----------|----------|----------|---------|')
            for f in sorted_f:
                sev = f.get('severity', '?')
                cat = f.get('category', '?')
                res = f.get('resource_id', '?')[:40]
                sav = f.get('estimated_monthly_savings', 0)
                print(f'| {sev} | {cat} | \`{res}\` | \${sav:.2f}/mo |')
        " 2>/dev/null || echo "Failed to parse findings")
        fi

        BODY=$(cat <<EOF
        ## Cloud Cost Analyzer — Scan Results

        | Metric | Value |
        |--------|-------|
        | Findings | **$FINDINGS** |
        | Potential Savings | **\$$SAVINGS/mo** |
        | Optimization Score | **$SCORE/100** |
        | Scan ID | \`$SCAN_ID\` |

        ### Top Findings

        $TOP_FINDINGS

        ---
        *Scanned by [Cloud Cost Analyzer](https://cca.dragonfractal.com) — [View full report](https://cca.dragonfractal.com/scans/$SCAN_ID)*
        EOF
        )

        gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

    - name: Check threshold
      if: inputs.fail-on-findings != '0'
      shell: bash
      run: |
        FINDINGS="${{ steps.scan.outputs.findings_count }}"
        THRESHOLD="${{ inputs.fail-on-findings }}"
        if [ "$FINDINGS" -gt "$THRESHOLD" ]; then
          echo "::error::CCA found $FINDINGS findings (threshold: $THRESHOLD)"
          exit 1
        fi
