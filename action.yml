name: 'CCA Cost Scan'
description: 'Scan cloud infrastructure for cost optimization opportunities with Cloud Cost Analyzer'
author: 'DragonFractal'
branding:
  icon: 'dollar-sign'
  color: 'blue'

inputs:
  api-key:
    description: 'CCA API key for managed mode (required)'
    required: true
  provider:
    description: 'Cloud provider to scan (aws, azure)'
    required: false
    default: 'aws'
  regions:
    description: 'Comma-separated regions to scan (e.g. us-east-1,us-west-2)'
    required: false
    default: ''
  service-url:
    description: 'CCA service URL'
    required: false
    default: 'https://cca.dragonfractal.com'
  version:
    description: 'CCA Docker image version tag (default: latest)'
    required: false
    default: 'latest'
  output-format:
    description: 'Output format: table, json, yaml, markdown'
    required: false
    default: 'json'
  output-file:
    description: 'Path to save scan results'
    required: false
    default: 'cca-scan-results.json'
  comment-on-pr:
    description: 'Post scan summary as a PR comment (true/false)'
    required: false
    default: 'true'
  fail-on-findings:
    description: 'Fail the action if findings exceed this threshold (0 = never fail)'
    required: false
    default: '0'

outputs:
  findings-count:
    description: 'Number of findings detected'
    value: ${{ steps.scan.outputs.findings_count }}
  total-savings:
    description: 'Total potential monthly savings (USD)'
    value: ${{ steps.scan.outputs.total_savings }}
  optimization-score:
    description: 'Infrastructure optimization score (0-100)'
    value: ${{ steps.scan.outputs.optimization_score }}

runs:
  using: 'composite'
  steps:
    - name: Pull CCA image
      shell: bash
      run: docker pull dragonfractal/cca:${{ inputs.version }}

    - name: Run CCA scan
      id: scan
      shell: bash
      run: |
        # Build docker run command with AWS creds passed through
        DOCKER_ARGS="--rm"
        DOCKER_ARGS="$DOCKER_ARGS -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY"
        DOCKER_ARGS="$DOCKER_ARGS -e AWS_SESSION_TOKEN -e AWS_DEFAULT_REGION -e AWS_REGION"
        DOCKER_ARGS="$DOCKER_ARGS -v $(pwd):/output -w /output"

        CCA_ARGS="scan --provider ${{ inputs.provider }}"
        CCA_ARGS="$CCA_ARGS --api-key ${{ inputs.api-key }}"
        CCA_ARGS="$CCA_ARGS --service-url ${{ inputs.service-url }}"

        if [ -n "${{ inputs.regions }}" ]; then
          CCA_ARGS="$CCA_ARGS --regions ${{ inputs.regions }}"
        fi

        CCA_ARGS="$CCA_ARGS -o ${{ inputs.output-format }}"
        CCA_ARGS="$CCA_ARGS -f /output/${{ inputs.output-file }}"
        CCA_ARGS="$CCA_ARGS --all"

        echo "Running: docker run $DOCKER_ARGS dragonfractal/cca:${{ inputs.version }} $CCA_ARGS"
        docker run $DOCKER_ARGS dragonfractal/cca:${{ inputs.version }} $CCA_ARGS || true

        # Parse results
        if [ -f "${{ inputs.output-file }}" ]; then
          FINDINGS=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        print(len(data.get('findings', [])))
        " 2>/dev/null || echo "0")

          SAVINGS=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        s = data.get('summary', {})
        print(f'{s.get(\"total_monthly_savings\", 0):.2f}')
        " 2>/dev/null || echo "0.00")

          # total_findings includes gated findings for community tier
          TOTAL=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        s = data.get('summary', {})
        print(s.get('total_findings', len(data.get('findings', []))))
        " 2>/dev/null || echo "$FINDINGS")
        else
          FINDINGS=0
          SAVINGS="0.00"
          TOTAL=0
        fi

        echo "findings_count=$TOTAL" >> $GITHUB_OUTPUT
        echo "total_savings=$SAVINGS" >> $GITHUB_OUTPUT

        echo "=== CCA Scan Summary ==="
        echo "  Findings: $TOTAL"
        echo "  Potential savings: \$$SAVINGS/mo"

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        FINDINGS="${{ steps.scan.outputs.findings_count }}"
        SAVINGS="${{ steps.scan.outputs.total_savings }}"

        # Build top findings table
        TOP_FINDINGS=""
        if [ -f "${{ inputs.output-file }}" ]; then
          TOP_FINDINGS=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            data = json.load(f)
        findings = data.get('findings', [])
        if not findings:
            print('No detailed findings available (upgrade for full details).')
        else:
            sorted_f = sorted(findings, key=lambda x: x.get('estimated_monthly_savings', 0), reverse=True)[:10]
            print('| Severity | Category | Resource | Savings |')
            print('|----------|----------|----------|---------|')
            for f in sorted_f:
                sev = f.get('severity', '?')
                cat = f.get('category', '?')
                res = f.get('resource_id', '?')[:40]
                sav = f.get('estimated_monthly_savings', 0)
                print(f'| {sev} | {cat} | \`{res}\` | \${sav:.2f}/mo |')
        " 2>/dev/null || echo "Failed to parse findings")
        fi

        BODY=$(cat <<'ENDOFCOMMENT'
        ## Cloud Cost Analyzer — Scan Results

        | Metric | Value |
        |--------|-------|
        | Findings | **FINDINGS_PLACEHOLDER** |
        | Potential Savings | **$SAVINGS_PLACEHOLDER/mo** |

        ### Top Findings

        TOP_FINDINGS_PLACEHOLDER

        ---
        *Scanned by [Cloud Cost Analyzer](https://cca.dragonfractal.com)*
        ENDOFCOMMENT
        )

        BODY="${BODY//FINDINGS_PLACEHOLDER/$FINDINGS}"
        BODY="${BODY//SAVINGS_PLACEHOLDER/$SAVINGS}"
        BODY="${BODY//TOP_FINDINGS_PLACEHOLDER/$TOP_FINDINGS}"

        gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

    - name: Check threshold
      if: inputs.fail-on-findings != '0'
      shell: bash
      run: |
        FINDINGS="${{ steps.scan.outputs.findings_count }}"
        THRESHOLD="${{ inputs.fail-on-findings }}"
        if [ "$FINDINGS" -gt "$THRESHOLD" ]; then
          echo "::error::CCA found $FINDINGS findings (threshold: $THRESHOLD)"
          exit 1
        fi
